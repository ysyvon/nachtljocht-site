<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Volume I Sample | Nachtljocht</title>
    <meta name="description" content="Read an eight-page sample from Volume I of Nachtljocht literary journal.">
    <meta name="robots" content="noindex,follow">
    <link rel="canonical" href="https://nachtljocht.com/sample-volume-one.html">
    <meta property="og:site_name" content="Nachtljocht">
    <meta property="og:title" content="Volume I Sample | Nachtljocht">
    <meta property="og:description" content="Read an eight-page sample from Volume I of Nachtljocht literary journal.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nachtljocht.com/sample-volume-one.html">
    <meta property="og:image" content="https://nachtljocht.com/nachtljochtbird.png">
    <meta property="og:image:secure_url" content="https://nachtljocht.com/nachtljochtbird.png">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1536">
    <meta property="og:image:height" content="1024">
    <meta property="og:image:alt" content="Nachtljocht bird emblem on a dark background">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Volume I Sample | Nachtljocht">
    <meta name="twitter:description" content="Read an eight-page sample from Volume I of Nachtljocht literary journal.">
    <meta name="twitter:image" content="https://nachtljocht.com/nachtljochtbird.png">
    <meta name="twitter:image:alt" content="Nachtljocht bird emblem on a dark background">
    <link rel="icon" type="image/png" href="./nachtljochtbird.png">
    <link rel="stylesheet" href="./sample-reader.css">
  </head>
  <body>
    <main
      class="standalone-reader"
      data-standalone-reader
      data-page-count="8"
      data-page-path="./assets/volume-one-sample/pages"
    >
      <header class="standalone-reader-header">
        <p class="standalone-reader-kicker">Read a Sample</p>
        <h1 class="standalone-reader-title">Nachtljocht · Volume I</h1>
      </header>

      <div class="standalone-reader-stage" data-sample-stage>
        <button
          class="standalone-reader-arrow"
          type="button"
          aria-label="Previous page"
          data-sample-previous
        >
          ←
        </button>
        <div class="standalone-reader-page">
          <img
            src="./assets/volume-one-sample/pages/page-01.png"
            alt="Nachtljocht Volume I sample page 1 of 8"
            data-sample-page
            draggable="false"
          >
        </div>
        <button
          class="standalone-reader-arrow"
          type="button"
          aria-label="Next page"
          data-sample-next
        >
          →
        </button>
      </div>

      <footer class="standalone-reader-controls">
        <button type="button" data-sample-previous>← Previous</button>
        <p class="standalone-reader-count">
          <span data-sample-current>1</span> / 8
        </p>
        <button type="button" data-sample-next>Next →</button>
      </footer>
      <p class="standalone-reader-hint">
        Swipe or use the arrow keys to turn pages.
      </p>
    </main>
    <script src="./sample-reader.js"></script>
  </body>
</html>
